    <script>
      // GitHub Pages SPA redirect (paired with public/404.html).
      // Restores the deep-link path that 404.html encoded into the query
      // string, so direct navigation and refresh work on project routes.
      // See https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
