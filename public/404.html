<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect (paired with the decoder in index.html).
      // Encodes the requested deep-link path into the query string and
      // bounces to the app root, where the router takes over. Unknown
      // routes render the app's own 404 page.
      // pathSegmentsToKeep = 1 keeps the "/personal-portfolio" base segment.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body>
    <p style="font-family: system-ui, sans-serif">Redirecting…</p>
  </body>
</html>
